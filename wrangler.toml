# Configuration Cloudflare Pages (site statique Astro + Pages Functions).
# Le site est servi depuis dist/ ; le dossier functions/ fournit l'API.
name = "annabac"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# Base de données D1 : file d'attente de modération.
# Créez-la avec : wrangler d1 create annabac
# puis collez l'identifiant renvoyé ci-dessous.
[[d1_databases]]
binding = "DB"
database_name = "annabac"
database_id = "8fc356b1-4a9c-4179-a4e6-966d9a0ca1c0"

# Stockage R2 : PDF soumis en attente de validation.
# Créez-le avec : wrangler r2 bucket create annabac-soumissions
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "annabac-soumissions"

# Variables publiques (non secrètes).
[vars]
GITHUB_OWNER = "Bac-242"
GITHUB_REPO = "annabac"
GITHUB_BRANCH = "main"
# Vérification cryptographique du jeton Cloudflare Access (espace admin).
# ACCESS_TEAM_DOMAIN : votre domaine d'équipe Zero Trust, ex. "monequipe.cloudflareaccess.com"
# ACCESS_AUD         : tag « Application Audience (AUD) » de l'application Access /admin
ACCESS_TEAM_DOMAIN = ""
ACCESS_AUD = ""

# Secrets (NE PAS mettre ici) — à définir via :
#   wrangler pages secret put GITHUB_TOKEN
#   wrangler pages secret put TURNSTILE_SECRET
# GITHUB_TOKEN    : jeton à portée "contents:write" sur le dépôt
# TURNSTILE_SECRET: clé secrète Cloudflare Turnstile (anti-spam)
